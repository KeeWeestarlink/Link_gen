<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Image To Public Link</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#0f172a;
        color:white;
        display:flex;
        justify-content:center;
        align-items:center;
        min-height:100vh;
        padding:20px;
    }

    .box{
        width:100%;
        max-width:400px;
        background:#1e293b;
        padding:25px;
        border-radius:20px;
        text-align:center;
        box-shadow:0 0 20px rgba(0,0,0,0.4);
    }

    h1{
        margin-bottom:20px;
        font-size:24px;
    }

    input{
        width:100%;
        padding:12px;
        border:none;
        border-radius:12px;
        background:#334155;
        color:white;
        margin-bottom:15px;
    }

    button{
        width:100%;
        padding:12px;
        border:none;
        border-radius:12px;
        background:#3b82f6;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
        margin-top:10px;
    }

    button:hover{
        background:#2563eb;
    }

    .result{
        margin-top:20px;
        word-break:break-all;
    }

    .result a{
        color:#38bdf8;
        text-decoration:none;
    }

    .preview{
        width:100%;
        margin-top:15px;
        border-radius:15px;
        display:none;
    }

    .footer{
        margin-top:25px;
        font-size:14px;
        color:#94a3b8;
    }

    .footer a{
        color:#38bdf8;
        text-decoration:none;
    }

    .copy-btn{
        background:#0ea5e9;
    }
</style>
</head>

<body>

<div class="box">
    <h1>Image Public Link</h1>

    <input type="file" id="imageInput" accept="image/*">

    <button onclick="uploadImage()">Upload Image</button>

    <img id="preview" class="preview">

    <div class="result" id="result"></div>

    <div class="footer">
        Make by 
        <a href="https://t.me/Koe_khant711" target="_blank">
            KeeWee
        </a>
    </div>
</div>

<script>

const imageInput = document.getElementById("imageInput");
const preview = document.getElementById("preview");

imageInput.addEventListener("change", () => {

    const file = imageInput.files[0];

    if(file){
        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";
    }

});

async function uploadImage() {

    const result = document.getElementById("result");

    if (!imageInput.files[0]) {
        alert("Please select an image!");
        return;
    }

    result.innerHTML = "Uploading...";

    const formData = new FormData();
    formData.append("image", imageInput.files[0]);

    try {

        const response = await fetch("https://api.imgbb.com/1/upload?key=0e0cd0ec7143f16ee983e9823b59d114", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if(data.success){

            result.innerHTML = `
                <p>Public Link:</p>
                <br>

                <a href="${data.data.url}" target="_blank">
                    ${data.data.url}
                </a>

                <button class="copy-btn" onclick="copyLink('${data.data.url}')">
                    Copy Link
                </button>
            `;

        } else {
            result.innerHTML = "Upload failed!";
        }

    } catch (err) {
        result.innerHTML = "Error uploading image!";
    }
}

function copyLink(link){

    navigator.clipboard.writeText(link);

    alert("Link Copied!");

}

</script>

</body>
</html>
